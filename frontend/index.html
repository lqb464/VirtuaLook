<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VirtuaLook — AI Virtual Try-On</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vl: {
              bg: '#060a12', panel: '#0c1422', 'panel-2': '#111b2e',
              accent: '#0095ff', 'accent-light': '#5bcefa', 'accent-dark': '#0071c5',
            }
          },
          fontFamily: { sans: ['Outfit', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="min-h-screen flex flex-col font-sans">

  <header class="site-header">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 brand text-lg">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 3l14 9-14 9V3z"/>
        </svg>
        VirtuaLook
      </a>
      <nav class="site-nav flex items-center gap-5 text-sm">
        <a href="/" class="active" data-i18n="home">Catalogue</a>
        <a href="/admin" data-i18n="admin">Jobs</a>
        <span id="backend-badge" class="badge text-xs opacity-80">…</span>
        <div class="flex gap-1 ml-1">
          <button class="lang-btn lang-btn-active" data-lang="vi" onclick="applyLang('vi')">VI</button>
          <button class="lang-btn" data-lang="en" onclick="applyLang('en')">EN</button>
        </div>
      </nav>
    </div>
  </header>

  <section id="garments" class="py-8 px-4 flex-1">
    <div class="max-w-6xl mx-auto">
      <div class="flex items-end justify-between mb-6 flex-wrap gap-3">
        <div>
          <p class="text-xs uppercase tracking-widest text-vl-accent-light font-semibold mb-1" data-i18n="badge">VTON demo</p>
          <h1 class="text-2xl font-bold text-slate-100" data-i18n="garmentsTitle">Garment catalogue</h1>
          <p class="text-sm text-slate-400 mt-1" data-i18n="heroSub">Chọn trang phục → upload ảnh → chạy inference (CatVTON / Replicate / mock).</p>
        </div>
        <div id="filter-pills" class="flex flex-wrap gap-2">
          <button onclick="filterGarments('all')" class="filter-pill active px-3 py-1.5 rounded-full text-sm" data-cat="all" data-i18n="catAll">Tất cả</button>
          <button onclick="filterGarments('tops')" class="filter-pill px-3 py-1.5 rounded-full text-sm" data-cat="tops" data-i18n="catTops">Áo</button>
          <button onclick="filterGarments('dresses')" class="filter-pill px-3 py-1.5 rounded-full text-sm" data-cat="dresses" data-i18n="catDresses">Váy</button>
          <button onclick="filterGarments('pants')" class="filter-pill px-3 py-1.5 rounded-full text-sm" data-cat="pants" data-i18n="catPants">Quần</button>
        </div>
      </div>

      <div id="garments-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-5">
        <div class="col-span-full flex justify-center py-16 text-slate-500">
          <svg class="animate-spin w-8 h-8" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
          </svg>
        </div>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <p data-i18n="footer">VirtuaLook · VTON inference demo</p>
  </footer>

  <script src="/static/app.js"></script>
  <script>
    let allGarments = [];

    async function loadBackendBadge() {
      const el = document.getElementById('backend-badge');
      if (!el) return;
      try {
        const info = await api('/health');
        const backend = info.backend || 'unknown';
        const device = info.device || '';
        el.textContent = device ? `${backend} · ${device}` : backend;
      } catch {
        el.textContent = 'offline';
      }
    }

    async function loadGarments() {
      try {
        allGarments = await api('/api/garments');
        renderGarments(allGarments);
      } catch (e) {
        const t = TRANSLATIONS[currentLang];
        document.getElementById('garments-grid').innerHTML =
          `<p class="col-span-full text-center text-red-400 py-8">${t.loadError}</p>`;
      }
    }

    function filterGarments(cat) {
      document.querySelectorAll('.filter-pill').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
      const filtered = cat === 'all' ? allGarments : allGarments.filter(g => g.category === cat);
      renderGarments(filtered);
    }

    function renderGarments(garments) {
      const t = TRANSLATIONS[currentLang];
      const grid = document.getElementById('garments-grid');
      if (!garments.length) {
        grid.innerHTML = `<p class="col-span-full text-center text-slate-500 py-12">${t.noGarments}</p>`;
        return;
      }
      grid.innerHTML = garments.map(g => `
        <div class="garment-card rounded-xl overflow-hidden group cursor-pointer"
             onclick="window.location='/tryon?garmentId=${g.id}'">
          <div class="aspect-[3/4] overflow-hidden bg-vl-panel-2">
            <img src="${g.image_url}" alt="${g.name}"
                 class="w-full h-full object-cover group-hover:scale-105 transition duration-300"
                 onerror="this.src='https://placehold.co/400x533/0c1422/64748b?text=No+Image'"/>
          </div>
          <div class="p-3">
            <h3 class="font-semibold text-slate-200 text-sm truncate">${g.name}</h3>
            <span class="text-xs text-slate-500 capitalize">${g.category}</span>
          </div>
          <div class="px-3 pb-3">
            <button class="vl-btn-primary w-full text-sm py-2 rounded-lg">${t.tryOn}</button>
          </div>
        </div>
      `).join('');
    }

    initLang();
    loadBackendBadge();
    loadGarments();
  </script>
</body>
</html>
