<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — VirtuaLook</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vl: {
              bg: '#060a12', panel: '#0c1422', 'panel-2': '#111b2e',
              accent: '#0095ff', 'accent-light': '#5bcefa', 'accent-dark': '#0071c5',
            }
          },
          fontFamily: { sans: ['Outfit', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="min-h-screen flex flex-col font-sans">

  <header class="site-header">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 brand text-lg">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 3l14 9-14 9V3z"/>
        </svg>
        VirtuaLook
      </a>
      <nav class="site-nav flex items-center gap-6 text-sm">
        <a href="/" data-i18n="home">Catalogue</a>
        <a href="/admin" class="active" data-i18n="admin">Jobs</a>
        <div class="flex gap-1 ml-2">
          <button class="lang-btn lang-btn-active" data-lang="vi" onclick="applyLang('vi')">VI</button>
          <button class="lang-btn" data-lang="en" onclick="applyLang('en')">EN</button>
        </div>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8 flex-1 w-full">
    <h1 class="text-2xl font-bold text-slate-100 mb-6" data-i18n="adminTitle">Jobs & trang phục</h1>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="vl-card p-4 text-center">
        <p class="text-3xl font-bold text-vl-accent-light" id="stat-garments">—</p>
        <p class="text-sm text-slate-400 mt-1" data-i18n="statGarments">Trang Phục</p>
      </div>
      <div class="vl-card p-4 text-center">
        <p class="text-3xl font-bold text-vl-accent-light" id="stat-jobs">—</p>
        <p class="text-sm text-slate-400 mt-1" data-i18n="statJobs">Tổng Lượt Thử</p>
      </div>
      <div class="vl-card p-4 text-center">
        <p class="text-3xl font-bold text-emerald-400" id="stat-done">—</p>
        <p class="text-sm text-slate-400 mt-1" data-i18n="statDone">Thành Công</p>
      </div>
      <div class="vl-card p-4 text-center">
        <p class="text-3xl font-bold text-vl-accent-light" id="stat-rate">—%</p>
        <p class="text-sm text-slate-400 mt-1" data-i18n="statRate">Tỷ Lệ Thành Công</p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

      <div>
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-semibold text-slate-200" data-i18n="garmentsSection">Trang Phục</h2>
          <button onclick="toggleAddForm()"
            class="vl-btn-primary text-sm px-3 py-1.5"
            data-i18n="addGarment">
            + Thêm Trang Phục
          </button>
        </div>

        <div id="add-form" class="hidden vl-card p-4 mb-4 space-y-3">
          <h3 class="font-medium text-slate-300 text-sm" data-i18n="newGarment">Trang Phục Mới</h3>
          <input id="new-name" type="text" data-i18n-placeholder="namePlaceholder"
            placeholder="Tên" class="vl-input" />
          <select id="new-category" class="vl-input">
            <option value="tops" data-i18n="catTops">Áo</option>
            <option value="dresses" data-i18n="catDresses">Váy</option>
            <option value="pants" data-i18n="catPants">Quần</option>
            <option value="outerwear">Outerwear</option>
          </select>
          <input id="new-image-url" type="url" data-i18n-placeholder="imageUrlPlaceholder"
            placeholder="URL Hình Ảnh" class="vl-input" />
          <textarea id="new-description" data-i18n-placeholder="descPlaceholder"
            placeholder="Mô tả (tùy chọn)" rows="2" class="vl-input"></textarea>
          <div class="flex gap-2">
            <button onclick="addGarment()" class="vl-btn-primary flex-1 py-2 text-sm" data-i18n="save">Lưu</button>
            <button onclick="toggleAddForm()" class="vl-btn-ghost flex-1 py-2 text-sm" data-i18n="cancel">Hủy</button>
          </div>
        </div>

        <div id="garments-list" class="space-y-2">
          <div class="flex justify-center py-8 text-slate-500">
            <svg class="animate-spin w-6 h-6" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
            </svg>
          </div>
        </div>
      </div>

      <div>
        <h2 class="text-lg font-semibold text-slate-200 mb-4" data-i18n="jobsSection">Lịch Sử Thử Đồ</h2>
        <div id="jobs-list" class="space-y-2">
          <div class="flex justify-center py-8 text-slate-500">
            <svg class="animate-spin w-6 h-6" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
            </svg>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <p data-i18n="footer">Demo Công Nghệ Thử Đồ AI — © 2026 VirtuaLook</p>
  </footer>

  <script src="/static/app.js"></script>
  <script>
    const STATUS_COLORS = {
      queued: 'bg-yellow-500/15 text-yellow-300',
      processing: 'bg-sky-500/15 text-sky-300',
      done: 'bg-emerald-500/15 text-emerald-300',
      failed: 'bg-red-500/15 text-red-300',
    };

    function toggleAddForm() {
      document.getElementById('add-form').classList.toggle('hidden');
    }

    async function loadStats() {
      try {
        const stats = await api('/api/admin/stats');
        document.getElementById('stat-garments').textContent = stats.total_garments;
        document.getElementById('stat-jobs').textContent = stats.total_jobs;
        document.getElementById('stat-done').textContent = stats.done_jobs;
        document.getElementById('stat-rate').textContent = stats.success_rate + '%';
      } catch (e) { console.error(e); }
    }

    async function loadGarments() {
      try {
        const garments = await api('/api/garments');
        const list = document.getElementById('garments-list');
        const t = TRANSLATIONS[currentLang];
        if (!garments.length) {
          list.innerHTML = `<p class="text-sm text-slate-500 text-center py-4">${t.noGarmentsAdmin}</p>`;
          return;
        }
        list.innerHTML = garments.map(g => `
          <div class="vl-card p-3 flex items-center gap-3">
            <img src="${g.image_url}" alt="${g.name}"
                 class="w-12 h-16 object-cover rounded-lg bg-vl-panel-2"
                 onerror="this.src='https://placehold.co/48x64/0c1422/64748b?text=?'" />
            <div class="flex-1 min-w-0">
              <p class="font-medium text-sm text-slate-200 truncate">${g.name}</p>
              <p class="text-xs text-slate-500 capitalize">${g.category}</p>
            </div>
            <a href="/tryon?garmentId=${g.id}"
               class="text-xs text-vl-accent-light border border-[rgba(0,149,255,0.35)] px-2 py-1 rounded hover:bg-vl-accent/10 transition mr-1">
              ${t.tryLink}
            </a>
            <button onclick="deleteGarment('${g.id}')"
              class="text-xs text-red-400 border border-red-500/30 px-2 py-1 rounded hover:bg-red-500/10 transition">
              ${t.deleteBtn}
            </button>
          </div>
        `).join('');
      } catch (e) { console.error(e); }
    }

    async function loadJobs() {
      try {
        const jobs = await api('/api/admin/jobs');
        const list = document.getElementById('jobs-list');
        const t = TRANSLATIONS[currentLang];
        if (!jobs.length) {
          list.innerHTML = `<p class="text-sm text-slate-500 text-center py-4">${t.noJobs}</p>`;
          return;
        }
        list.innerHTML = jobs.map(j => `
          <div class="vl-card p-3">
            <div class="flex items-center justify-between gap-2">
              <div class="min-w-0">
                <p class="font-medium text-sm text-slate-200 truncate">${j.garment_name || 'Unknown garment'}</p>
                <p class="text-xs text-slate-500">${j.created_at ? new Date(j.created_at).toLocaleString() : ''}</p>
              </div>
              <span class="shrink-0 text-xs px-2 py-0.5 rounded-full font-medium ${STATUS_COLORS[j.status] || 'bg-slate-700/50 text-slate-400'}">${j.status}</span>
            </div>
            ${j.result_url ? `<a href="${j.result_url}" target="_blank" class="mt-2 block text-xs text-vl-accent-light hover:underline">${t.viewResult}</a>` : ''}
            ${j.error ? `<p class="mt-1 text-xs text-red-400 truncate">${j.error}</p>` : ''}
          </div>
        `).join('');
      } catch (e) { console.error(e); }
    }

    async function addGarment() {
      const name = document.getElementById('new-name').value.trim();
      const category = document.getElementById('new-category').value;
      const image_url = document.getElementById('new-image-url').value.trim();
      const description = document.getElementById('new-description').value.trim();
      if (!name || !image_url) {
        alert(currentLang === 'vi' ? 'Tên và URL hình ảnh là bắt buộc.' : 'Name and Image URL are required.');
        return;
      }
      try {
        await apiPost('/api/garments', { name, category, image_url, description });
        toggleAddForm();
        document.getElementById('new-name').value = '';
        document.getElementById('new-image-url').value = '';
        document.getElementById('new-description').value = '';
        await loadGarments();
        await loadStats();
      } catch (e) { alert('Failed to add garment: ' + e.message); }
    }

    async function deleteGarment(id) {
      const msg = currentLang === 'vi' ? 'Xóa trang phục này?' : 'Delete this garment?';
      if (!confirm(msg)) return;
      try {
        await apiDelete(`/api/garments/${id}`);
        await loadGarments();
        await loadStats();
      } catch (e) { alert('Failed to delete: ' + e.message); }
    }

    initLang();
    loadStats();
    loadGarments();
    loadJobs();
  </script>
</body>
</html>
